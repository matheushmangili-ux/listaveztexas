<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ListaVez Texas</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }
  .login-box {
    width: 100%;
    max-width: 420px;
    position: relative;
  }
  .brand-mark {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold) 50%, var(--gold-bright) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    box-shadow: 0 8px 32px rgba(196,162,101,.2);
  }
  .brand-mark span {
    font-family: var(--font-mono);
    font-weight: 800;
    font-size: 20px;
    color: var(--bg-deep);
    letter-spacing: -1px;
  }
  .tab-switch {
    display: flex;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 3px;
    margin-bottom: 28px;
  }
  .tab-switch button {
    flex: 1;
    padding: 12px 0;
    background: transparent;
    border: none;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
  }
  .tab-switch button.active {
    background: var(--bg-elevated);
    color: var(--gold-bright);
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .login-panel { display: none; }
  .login-panel.active { display: block; animation: fadeIn .3s ease; }
  .pin-group {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin: 32px 0;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .1em;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-subtle);
  }
  .version-tag {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: .05em;
    opacity: .5;
  }
  #loginError {
    display: none;
    padding: 12px 16px;
    background: var(--danger-bg);
    border: 1px solid rgba(248,113,113,.15);
    border-radius: var(--radius-sm);
    color: var(--danger);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
  }
  #loginError.show { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-box">
    <!-- Brand -->
    <div class="brand-mark">
      <span>LV</span>
    </div>
    <h1 style="text-align:center;font-family:var(--font-mono);font-size:22px;font-weight:800;letter-spacing:.5px;margin-bottom:4px">
      ListaVez
    </h1>
    <p style="text-align:center;font-size:12px;color:var(--text-muted);font-weight:500;letter-spacing:.15em;text-transform:uppercase;margin-bottom:36px">
      Texas Center
    </p>

    <div class="gold-line" style="margin-bottom:32px"></div>

    <!-- Tabs -->
    <div class="tab-switch">
      <button class="active" onclick="switchTab('pin')">PIN Rápido</button>
      <button onclick="switchTab('email')">Email</button>
    </div>

    <!-- Error -->
    <div id="loginError">
      <i class="fa-solid fa-circle-xmark"></i>
      <span id="loginErrorMsg"></span>
    </div>

    <!-- PIN Login -->
    <div id="panelPin" class="login-panel active">
      <p style="text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:8px;font-weight:500">
        Digite seu PIN de 4 dígitos
      </p>
      <div class="pin-group">
        <input class="pin-input" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="0" autofocus>
        <input class="pin-input" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="1">
        <input class="pin-input" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="2">
        <input class="pin-input" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="3">
      </div>
      <button id="btnPin" class="btn btn-primary" style="width:100%" onclick="handlePinLogin()" disabled>
        <i class="fa-solid fa-right-to-bracket"></i>
        Entrar
      </button>
    </div>

    <!-- Email Login -->
    <div id="panelEmail" class="login-panel">
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Email</label>
        <input id="emailInput" class="input" type="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div style="margin-bottom:24px">
        <label style="display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Senha</label>
        <input id="passInput" class="input" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button id="btnEmail" class="btn btn-primary" style="width:100%" onclick="handleEmailLogin()">
        <i class="fa-solid fa-right-to-bracket"></i>
        Entrar
      </button>
    </div>

  </div>
</div>

<div id="toastContainer"></div>
<span class="version-tag">ListaVez v1.0 — Texas Center</span>

<script type="module">
import { login, loginWithPin, getUser, redirectByRole } from './js/auth.js';
import { toast } from './js/utils.js';

// Check if already logged in
const user = await getUser();
if (user) redirectByRole(user);

// Tab switching
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-switch button').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'pin' && i === 0) || (tab === 'email' && i === 1));
  });
  document.getElementById('panelPin').classList.toggle('active', tab === 'pin');
  document.getElementById('panelEmail').classList.toggle('active', tab === 'email');
  hideError();
  if (tab === 'pin') document.querySelector('.pin-input').focus();
  if (tab === 'email') document.getElementById('emailInput').focus();
};

// PIN auto-advance
const pins = document.querySelectorAll('.pin-input');
pins.forEach((input, idx) => {
  input.addEventListener('input', () => {
    input.value = input.value.replace(/\D/g, '');
    if (input.value && idx < 3) pins[idx + 1].focus();
    checkPinComplete();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !input.value && idx > 0) {
      pins[idx - 1].focus();
      pins[idx - 1].value = '';
    }
    if (e.key === 'Enter') handlePinLogin();
  });
});

function getPin() {
  return Array.from(pins).map(p => p.value).join('');
}

function checkPinComplete() {
  const pin = getPin();
  document.getElementById('btnPin').disabled = pin.length < 4;
  if (pin.length === 4) handlePinLogin();
}

function showError(msg) {
  const el = document.getElementById('loginError');
  document.getElementById('loginErrorMsg').textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('loginError').classList.remove('show');
}

window.handlePinLogin = async function() {
  const pin = getPin();
  if (pin.length !== 4) return;
  const btn = document.getElementById('btnPin');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Entrando...';
  hideError();
  try {
    const user = await loginWithPin(pin);
    toast('Bem-vindo!', 'success');
    setTimeout(() => redirectByRole(user), 500);
  } catch (e) {
    showError('PIN inválido. Tente novamente.');
    pins.forEach(p => p.value = '');
    pins[0].focus();
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar';
  }
};

window.handleEmailLogin = async function() {
  const email = document.getElementById('emailInput').value.trim();
  const pass = document.getElementById('passInput').value;
  if (!email || !pass) { showError('Preencha email e senha.'); return; }
  const btn = document.getElementById('btnEmail');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Entrando...';
  hideError();
  try {
    const user = await login(email, pass);
    toast('Bem-vindo!', 'success');
    setTimeout(() => redirectByRole(user), 500);
  } catch (e) {
    showError('Email ou senha incorretos.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar';
  }
};

// Email form: Enter to submit
document.getElementById('passInput')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleEmailLogin();
});
</script>
</body>
</html>
