<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Minha Vez — Texas Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css?v=5">
<meta name="theme-color" content="#09090B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Force dark theme on login — clear any stale localStorage value
localStorage.removeItem('lv-theme');
document.documentElement.setAttribute('data-theme', 'dark');
// Unregister old service workers and re-register fresh
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  }).then(() => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
<style>
  .login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  /* Logo watermark — removed */
  /* Red glow pulse */
  .login-container::after {
    content: '';
    position: absolute;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(225,29,72,.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: heroGlow 4s ease-in-out infinite alternate;
  }
  @keyframes heroGlow {
    0% { opacity: .4; transform: translateX(-50%) scale(1); }
    100% { opacity: .8; transform: translateX(-50%) scale(1.15); }
  }
  /* Floating particles */
  .particles-bg {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--accent, #E11D48);
    border-radius: 50%;
    opacity: 0;
    animation: particleUp linear infinite;
  }
  @keyframes particleUp {
    0% { opacity: 0; transform: translateY(100vh) scale(0); }
    10% { opacity: .35; }
    90% { opacity: .35; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1); }
  }
  [data-theme="light"] .brand-mark img {
    filter: none !important;
    opacity: 1 !important;
  }
  .login-box {
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
  }
  .tab-switch {
    display: flex;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 2px;
    margin-bottom: 28px;
  }
  .tab-switch button {
    flex: 1;
    padding: 10px 0;
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 150ms ease;
  }
  .tab-switch button.active {
    background: var(--bg-elevated);
    color: var(--accent);
  }
  .login-panel { display: none; }
  .login-panel.active { display: block; animation: fadeIn .2s ease; }
  .pin-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 28px 0;
  }
  .version-tag {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: .05em;
    opacity: .4;
  }
  #loginError {
    display: none;
    padding: 12px 16px;
    background: var(--danger-bg);
    border: 1px solid rgba(248,113,113,.1);
    border-radius: var(--radius-sm);
    color: var(--danger);
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
  }
  #loginError.show { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<div class="particles-bg" id="particles"></div>
<div class="login-container">
  <div class="login-box">
    <!-- Brand -->
    <div class="brand-mark" style="text-align:center;margin-bottom:32px">
      <img src="/assets/logo-minhavez-new.png" alt="MinhaVez" style="width:180px;height:auto;display:inline-block">
    </div>

    <div class="gold-line" style="margin-bottom:28px"></div>

    <!-- Tabs -->
    <div class="tab-switch">
      <button class="active" onclick="switchTab('pin')">PIN Rápido</button>
      <button onclick="switchTab('email')">Email</button>
    </div>

    <!-- Error -->
    <div id="loginError">
      <i class="fa-solid fa-circle-xmark"></i>
      <span id="loginErrorMsg"></span>
    </div>

    <!-- PIN Login -->
    <div id="panelPin" class="login-panel active">
      <p style="text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:8px;font-weight:500">
        Digite seu PIN de 4 dígitos
      </p>
      <div class="pin-group">
        <input class="pin-input" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="0" autofocus>
        <input class="pin-input" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="1">
        <input class="pin-input" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="2">
        <input class="pin-input" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" data-pin="3">
      </div>
      <button id="btnPin" class="btn btn-primary" style="width:100%" onclick="handlePinLogin()" disabled>
        <i class="fa-solid fa-right-to-bracket"></i>
        Entrar
      </button>
    </div>

    <!-- Email Login -->
    <div id="panelEmail" class="login-panel">
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Email</label>
        <input id="emailInput" class="input" type="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div style="margin-bottom:24px">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Senha</label>
        <input id="passInput" class="input" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button id="btnEmail" class="btn btn-primary" style="width:100%" onclick="handleEmailLogin()">
        <i class="fa-solid fa-right-to-bracket"></i>
        Entrar
      </button>
    </div>

  </div>
</div>

<div id="toastContainer"></div>
<span class="version-tag">v1.1</span>

<script type="module">
import { login, loginWithPin, getUser, redirectByRole } from '/js/auth.js';
import { toast } from '/js/utils.js';
import { loadTenant, applyBranding, getSlug } from '/js/tenant.js';
// Login page always uses dark theme (set in HTML attribute), skip initTheme()

// Load tenant context from URL slug
const tenant = await loadTenant();
if (tenant) {
  applyBranding(tenant);
  // Update store name in UI
  const sub = document.querySelector('.login-box p');
  if (sub) sub.textContent = tenant.nome_loja.toUpperCase();
}

// Check if already logged in
const user = await getUser();
if (user) redirectByRole(user);

// Tab switching
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-switch button').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'pin' && i === 0) || (tab === 'email' && i === 1));
  });
  document.getElementById('panelPin').classList.toggle('active', tab === 'pin');
  document.getElementById('panelEmail').classList.toggle('active', tab === 'email');
  hideError();
  if (tab === 'pin') document.querySelector('.pin-input').focus();
  if (tab === 'email') document.getElementById('emailInput').focus();
};

// PIN auto-advance
const pins = document.querySelectorAll('.pin-input');
pins.forEach((input, idx) => {
  input.addEventListener('input', () => {
    input.value = input.value.replace(/\D/g, '');
    if (input.value && idx < 3) pins[idx + 1].focus();
    checkPinComplete();
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !input.value && idx > 0) {
      pins[idx - 1].focus();
      pins[idx - 1].value = '';
    }
    if (e.key === 'Enter') handlePinLogin();
  });
});

function getPin() {
  return Array.from(pins).map(p => p.value).join('');
}

function checkPinComplete() {
  const pin = getPin();
  document.getElementById('btnPin').disabled = pin.length < 4;
  if (pin.length === 4) handlePinLogin();
}

function showError(msg) {
  const el = document.getElementById('loginError');
  document.getElementById('loginErrorMsg').textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('loginError').classList.remove('show');
}

window.handlePinLogin = async function() {
  const pin = getPin();
  if (pin.length !== 4) return;
  const btn = document.getElementById('btnPin');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Entrando...';
  hideError();
  try {
    const user = await loginWithPin(pin);
    toast('Bem-vindo!', 'success');
    setTimeout(() => redirectByRole(user), 500);
  } catch (e) {
    showError('PIN inválido. Tente novamente.');
    pins.forEach(p => p.value = '');
    pins[0].focus();
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar';
  }
};

window.handleEmailLogin = async function() {
  const email = document.getElementById('emailInput').value.trim();
  const pass = document.getElementById('passInput').value;
  if (!email || !pass) { showError('Preencha email e senha.'); return; }
  const btn = document.getElementById('btnEmail');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Entrando...';
  hideError();
  try {
    const user = await login(email, pass);
    toast('Bem-vindo!', 'success');
    setTimeout(() => redirectByRole(user), 500);
  } catch (e) {
    showError('Email ou senha incorretos.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar';
  }
};

// Email form: Enter to submit
document.getElementById('passInput')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleEmailLogin();
});

// Floating particles
(function initParticles() {
  const c = document.getElementById('particles');
  if (!c) return;
  const n = window.innerWidth < 768 ? 12 : 22;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = Math.random() * 8 + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    if (Math.random() > 0.75) p.style.background = 'var(--success, #34D399)';
    c.appendChild(p);
  }
})();
</script>
</body>
</html>
