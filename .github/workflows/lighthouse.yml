name: Lighthouse

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel preview
        id: vercel-preview
        uses: zentered/vercel-preview-url@v1.4.0
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        with:
          vercel_team_id: ${{ secrets.VERCEL_TEAM_ID }}
          vercel_project_id: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://${{ steps.vercel-preview.outputs.preview_url }}/landing
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment results on PR
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));
              const r = results[0]?.summary || {};
              const fmt = (n) => Math.round((n || 0) * 100);
              const body = `### 🚦 Lighthouse — landing\n\n| Metric | Score |\n|---|---|\n| Performance | ${fmt(r.performance)} |\n| Accessibility | ${fmt(r.accessibility)} |\n| Best Practices | ${fmt(r['best-practices'])} |\n| SEO | ${fmt(r.seo)} |`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            } catch (e) {
              console.log('Skipping comment:', e.message);
            }
