<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Esqueci minha senha — Minha Vez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.v52.css" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo/mv-chevron-primary.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon-180.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      .page-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--bg-deep);
      }
      .card {
        width: 100%;
        max-width: 400px;
        background: var(--bg-card);
        box-shadow: var(--shadow-md);
        border-radius: 20px;
        border: 1px solid var(--border-subtle);
        padding: 32px;
      }
      [data-theme='dark'] .card {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 4px 24px rgba(0, 0, 0, 0.3);
      }
      .card h1 {
        font-family: var(--font-body);
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 6px;
        color: var(--text-primary);
      }
      .card p.desc {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 28px;
        line-height: 1.5;
      }
      .form-label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }
      .input {
        background: var(--bg-elevated) !important;
        border: 1px solid var(--border-medium) !important;
        color: var(--text-primary) !important;
      }
      .input::placeholder {
        color: var(--text-muted) !important;
      }
      .input:focus {
        border-color: var(--accent) !important;
      }
      .msg {
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 16px;
        display: none;
        align-items: center;
        gap: 8px;
      }
      .msg.error {
        background: color-mix(in srgb, var(--danger) 10%, transparent);
        border: 1px solid color-mix(in srgb, var(--danger) 20%, transparent);
        color: var(--danger);
      }
      .msg.success {
        background: color-mix(in srgb, var(--accent) 10%, transparent);
        border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
        color: var(--accent);
      }
      .msg.show {
        display: flex;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--text-muted);
        text-decoration: none;
        margin-top: 20px;
        transition: color 0.15s;
      }
      .back-link:hover {
        color: var(--accent);
      }
    </style>
    <script src="/js/components/mv-logo.js" defer></script>
  </head>
  <body
    style="
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family:
        'Inter Tight',
        system-ui,
        -apple-system,
        sans-serif;
    "
  >
    <div class="page-container">
      <div class="card">
        <h1>Esqueci minha senha</h1>
        <p class="desc">Digite seu email e enviaremos um link para redefinir sua senha.</p>

        <div id="msg" class="msg">
          <i id="msgIcon"></i>
          <span id="msgText"></span>
        </div>

        <div id="formArea">
          <div style="margin-bottom: 20px">
            <label class="form-label">Email</label>
            <input id="emailInput" class="input" type="email" placeholder="seu@email.com" autocomplete="email" />
          </div>

          <button id="btnSubmit" class="btn btn-primary" style="width: 100%" onclick="handleReset()">
            <i class="fa-solid fa-paper-plane"></i> Enviar link de recuperação
          </button>
        </div>

        <a class="back-link" id="backLink" href="/login"> <i class="fa-solid fa-arrow-left"></i> Voltar ao login </a>
      </div>
    </div>

    <script type="module">
      import { getSupabase } from '/js/supabase-config.js';
      import { getSlug } from '/js/tenant.js';

      const sb = getSupabase();
      const slug = getSlug();

      // Update back link to include slug
      if (slug) {
        document.getElementById('backLink').href = `/${slug}/login`;
      }

      function showMsg(type, text) {
        const el = document.getElementById('msg');
        document.getElementById('msgIcon').className =
          type === 'error' ? 'fa-solid fa-circle-xmark' : 'fa-solid fa-circle-check';
        document.getElementById('msgText').textContent = text;
        el.className = `msg ${type} show`;
      }

      window.handleReset = async function () {
        const email = document.getElementById('emailInput').value.trim();
        if (!email) {
          showMsg('error', 'Digite seu email');
          return;
        }

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div> Enviando...';

        const redirectTo = slug
          ? `${window.location.origin}/${slug}/reset-password`
          : `${window.location.origin}/reset-password`;

        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });

        if (error) {
          showMsg('error', 'Erro ao enviar email. Verifique o endereço e tente novamente.');
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Enviar link de recuperação';
          return;
        }

        showMsg('success', 'Email enviado! Verifique sua caixa de entrada (e o spam).');
        document.getElementById('formArea').style.display = 'none';
      };

      document.getElementById('emailInput')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleReset();
      });
    </script>
  </body>
</html>
