<!doctype html>
<html lang="pt-BR" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Redefinir senha — minhavez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/tokens.v54.css" />
    <link rel="stylesheet" href="/css/components.v54.css" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo/mv-chevron-primary.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon-180.png" />
    <meta name="theme-color" content="#1e40af" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      .mv-auth {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        background: var(--mv-surface);
      }
      .mv-auth__brand {
        background: var(--mv-primary);
        color: #fff;
        padding: 48px 56px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
        overflow: hidden;
        min-height: 100vh;
      }
      .mv-auth__brand-eyebrow {
        font-size: 13px;
        opacity: 0.7;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 16px;
        font-weight: 500;
      }
      .mv-auth__brand-title {
        font-size: 44px;
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin: 0 0 20px;
        font-weight: 600;
      }
      .mv-auth__brand-text {
        font-size: 16px;
        line-height: 1.55;
        opacity: 0.85;
        max-width: 420px;
        margin: 0;
      }
      .mv-auth__brand-decor {
        position: absolute;
        bottom: -60px;
        right: -80px;
        width: 360px;
        height: 360px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        pointer-events: none;
      }
      .mv-auth__form {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        background: var(--mv-surface);
      }
      .card {
        width: 100%;
        max-width: 380px;
      }
      .card h1 {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 6px;
        color: var(--mv-text);
      }
      .card p.desc {
        font-size: 14px;
        color: var(--mv-text-muted);
        margin: 0 0 24px;
        line-height: 1.5;
      }

      #msg {
        padding: 10px 14px;
        border-radius: var(--mv-radius-md);
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 16px;
        display: none;
        align-items: center;
        gap: 8px;
      }
      #msg.error {
        background: var(--mv-status-error-bg);
        border: 1px solid #fecaca;
        color: var(--mv-status-error);
      }
      #msg.success {
        background: var(--mv-status-available-bg);
        border: 1px solid #bbf7d0;
        color: var(--mv-status-available);
      }
      #msg.show {
        display: flex;
      }

      .mv-auth__submit {
        width: 100%;
        margin-top: 4px;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: mvSpin 0.7s linear infinite;
        display: inline-block;
      }
      @keyframes mvSpin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 720px) {
        .mv-auth {
          grid-template-columns: 1fr;
        }
        .mv-auth__brand {
          min-height: auto;
          padding: 24px 24px 32px;
        }
        .mv-auth__brand-title {
          font-size: 28px;
        }
        .mv-auth__brand-text {
          font-size: 14px;
        }
        .mv-auth__brand-decor {
          display: none;
        }
        .mv-auth__form {
          padding: 32px 20px;
        }
      }
    </style>
  </head>
  <body class="mv-app">
    <main class="mv-auth">
      <aside class="mv-auth__brand">
        <span class="mv-wordmark mv-wordmark--inverse">
          <span class="mv-wordmark__mark">m</span>
          <span class="mv-wordmark__text">minha<em>vez</em></span>
        </span>
        <div>
          <div class="mv-auth__brand-eyebrow">Nova senha</div>
          <h2 class="mv-auth__brand-title">Defina, salve,<br />volte a vender.</h2>
          <p class="mv-auth__brand-text">
            Escolha uma senha forte (mínimo 6 caracteres).<br />
            Te mandamos de volta pro login automaticamente.
          </p>
        </div>
        <div class="mv-auth__brand-decor" aria-hidden="true"></div>
      </aside>

      <section class="mv-auth__form">
        <div class="card">
          <h1>Redefinir senha</h1>
          <p class="desc">Digite sua nova senha abaixo.</p>

          <div id="msg">
            <svg class="mv-icon" id="msgIcon"><use href="/assets/icons/mv-sprite.svg#mv-x" /></svg>
            <span id="msgText"></span>
          </div>

          <div id="formArea">
            <div class="mv-field" style="margin-bottom: 14px">
              <label class="mv-field__label" for="newPassword">Nova senha</label>
              <div class="mv-field__control">
                <svg class="mv-icon" style="color: var(--mv-text-faint)">
                  <use href="/assets/icons/mv-sprite.svg#mv-lock" />
                </svg>
                <input
                  id="newPassword"
                  type="password"
                  placeholder="Mínimo 6 caracteres"
                  autocomplete="new-password"
                  minlength="6"
                />
              </div>
            </div>

            <div class="mv-field" style="margin-bottom: 18px">
              <label class="mv-field__label" for="confirmPassword">Confirmar nova senha</label>
              <div class="mv-field__control">
                <svg class="mv-icon" style="color: var(--mv-text-faint)">
                  <use href="/assets/icons/mv-sprite.svg#mv-lock" />
                </svg>
                <input id="confirmPassword" type="password" placeholder="Repita a senha" autocomplete="new-password" />
              </div>
            </div>

            <button id="btnSubmit" class="mv-btn mv-btn--primary mv-btn--lg mv-auth__submit" onclick="handleUpdate()">
              <svg class="mv-icon"><use href="/assets/icons/mv-sprite.svg#mv-check" /></svg>
              Salvar nova senha
            </button>
          </div>
        </div>
      </section>
    </main>

    <script type="module">
      import { getSupabase } from '/js/supabase-config.js';
      import { getSlug } from '/js/tenant.js';

      const sb = getSupabase();
      const slug = getSlug();

      function showMsg(type, text) {
        const el = document.getElementById('msg');
        const icon = document.getElementById('msgIcon');
        const useEl = icon.querySelector('use');
        if (useEl) {
          useEl.setAttribute(
            'href',
            type === 'error' ? '/assets/icons/mv-sprite.svg#mv-x' : '/assets/icons/mv-sprite.svg#mv-check'
          );
        }
        document.getElementById('msgText').textContent = text;
        el.className = `${type} show`;
      }

      // Supabase manda o usuário pra cá com hash contendo access_token
      // O JS client pega via onAuthStateChange
      sb.auth.onAuthStateChange(async (event) => {
        if (event === 'PASSWORD_RECOVERY') {
          // user veio do e-mail — formulário pronto
        }
      });

      window.handleUpdate = async function () {
        const pass = document.getElementById('newPassword').value;
        const pass2 = document.getElementById('confirmPassword').value;

        if (!pass || pass.length < 6) {
          showMsg('error', 'A senha deve ter pelo menos 6 caracteres');
          return;
        }
        if (pass !== pass2) {
          showMsg('error', 'As senhas não conferem');
          return;
        }

        const btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div> Salvando...';

        const { error } = await sb.auth.updateUser({ password: pass });

        if (error) {
          showMsg('error', 'Erro ao atualizar senha: ' + error.message);
          btn.disabled = false;
          btn.innerHTML =
            '<svg class="mv-icon"><use href="/assets/icons/mv-sprite.svg#mv-check"/></svg> Salvar nova senha';
          return;
        }

        showMsg('success', 'Senha atualizada com sucesso! Redirecionando...');
        document.getElementById('formArea').style.display = 'none';

        const loginUrl = slug ? `/${slug}/login` : '/';
        setTimeout(() => {
          window.location.href = loginUrl;
        }, 2000);
      };

      document.getElementById('confirmPassword')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleUpdate();
      });
    </script>
  </body>
</html>
