<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Redefinir senha — Minha Vez</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700,800,900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .page-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: #FFFFFF;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: #FFFFFF;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
    border-radius: 20px;
    border: 1px solid rgba(0,0,0,.06);
    padding: 32px;
  }
  .card h1 {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #1A1A1A;
  }
  .card p.desc {
    font-size: 13px;
    color: #71717A;
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #71717A;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
  }
  .form-group { margin-bottom: 20px; }
  .input {
    background: #F5F5F7 !important;
    border: 1px solid rgba(0,0,0,.1) !important;
    color: #1A1A1A !important;
  }
  .input::placeholder { color: #A1A1AA !important; }
  .input:focus { border-color: #e2506f !important; }
  .msg {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .msg.error {
    background: rgba(239,68,68,.06);
    border: 1px solid rgba(239,68,68,.1);
    color: #EF4444;
  }
  .msg.success {
    background: rgba(52,211,153,.06);
    border: 1px solid rgba(52,211,153,.15);
    color: #059669;
  }
  .msg.show { display: flex; }
</style>
</head>
<body style="background:#FFFFFF;color:#1A1A1A;font-family:'Satoshi',system-ui,-apple-system,sans-serif">

<div class="page-container">
  <div class="card">
    <h1>Redefinir senha</h1>
    <p class="desc">Digite sua nova senha abaixo.</p>

    <div id="msg" class="msg">
      <i id="msgIcon"></i>
      <span id="msgText"></span>
    </div>

    <div id="formArea">
      <div class="form-group">
        <label class="form-label">Nova senha</label>
        <input id="newPassword" class="input" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6">
      </div>

      <div class="form-group">
        <label class="form-label">Confirmar nova senha</label>
        <input id="confirmPassword" class="input" type="password" placeholder="Repita a senha" autocomplete="new-password">
      </div>

      <button id="btnSubmit" class="btn btn-primary" style="width:100%" onclick="handleUpdate()">
        <i class="fa-solid fa-key"></i> Salvar nova senha
      </button>
    </div>
  </div>
</div>

<script type="module">
import { getSupabase } from '/js/supabase-config.js';
import { getSlug } from '/js/tenant.js';

const sb = getSupabase();
const slug = getSlug();

function showMsg(type, text) {
  const el = document.getElementById('msg');
  document.getElementById('msgIcon').className = type === 'error' ? 'fa-solid fa-circle-xmark' : 'fa-solid fa-circle-check';
  document.getElementById('msgText').textContent = text;
  el.className = `msg ${type} show`;
}

// Supabase sends the user here with a hash fragment containing the access_token
// The JS client picks it up automatically via onAuthStateChange
sb.auth.onAuthStateChange(async (event) => {
  if (event === 'PASSWORD_RECOVERY') {
    // User arrived from the reset email — form is ready
  }
});

window.handleUpdate = async function() {
  const pass = document.getElementById('newPassword').value;
  const pass2 = document.getElementById('confirmPassword').value;

  if (!pass || pass.length < 6) { showMsg('error', 'A senha deve ter pelo menos 6 caracteres'); return; }
  if (pass !== pass2) { showMsg('error', 'As senhas não conferem'); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Salvando...';

  const { error } = await sb.auth.updateUser({ password: pass });

  if (error) {
    showMsg('error', 'Erro ao atualizar senha: ' + error.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-key"></i> Salvar nova senha';
    return;
  }

  showMsg('success', 'Senha atualizada com sucesso! Redirecionando...');
  document.getElementById('formArea').style.display = 'none';

  const loginUrl = slug ? `/${slug}/login` : '/';
  setTimeout(() => { window.location.href = loginUrl; }, 2000);
};

document.getElementById('confirmPassword')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleUpdate();
});
</script>
</body>
</html>
